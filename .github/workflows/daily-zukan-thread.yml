
name: Daily Zukan Thread

# 思い出図鑑の当日スレ作成とX予約投稿。
# GitHub Actions schedule はベストエフォートなので、JST 00:05の本実行に加えて
# JST 01:05 / 07:05 に救済実行する。endpoint側の posted_date UNIQUE と
# schedule completed 判定で同日二重作成を防ぐ。
on:
  schedule:
    - cron: "5 15,16,22 * * *"
  workflow_dispatch:

jobs:
  daily-zukan-thread:
    runs-on: ubuntu-latest
    steps:
      - name: Call daily-zukan-thread API
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -uo pipefail

          URL="https://www.duema-bbs.com/api/internal/daily-zukan-thread"

          echo "==== daily-zukan-thread 実行 ===="
          echo "実行時刻 UTC : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "実行時刻 JST : $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S')"
          echo "トリガー     : ${EVENT_NAME}"
          echo "モード       : LIVE（dryRun=false）"
          echo "URL          : ${URL}"
          echo "================================"

          set +e
          HTTP_CODE=$(curl -sS \
            --retry 2 --retry-delay 10 --max-time 60 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -o response_body.txt -w '%{http_code}' \
            "${URL}")
          CURL_EXIT=$?
          set -e

          echo "HTTP status  : ${HTTP_CODE}"
          echo "----- レスポンス本文 -----"
          cat response_body.txt 2>/dev/null || echo "(本文なし)"
          echo
          echo "--------------------------"

          if [ "${CURL_EXIT}" -ne 0 ]; then
            echo "::error::curl 失敗 (exit=${CURL_EXIT})"
            exit "${CURL_EXIT}"
          fi
          case "${HTTP_CODE}" in
            2*) echo "OK (HTTP ${HTTP_CODE})" ;;
            *) echo "::error::HTTP ${HTTP_CODE} はエラー扱い"; exit 1 ;;
          esac

          ERRORS=$(jq -r '.errors // 0' response_body.txt 2>/dev/null || echo "parse_error")
          CREATED=$(jq -r '.created // 0' response_body.txt 2>/dev/null || echo "0")
          DUPLICATE=$(jq -r '.duplicate // 0' response_body.txt 2>/dev/null || echo "0")
          SKIPPED=$(jq -r '.skipped // 0' response_body.txt 2>/dev/null || echo "0")
          STATUS=$(jq -r '.status // "unknown"' response_body.txt 2>/dev/null || echo "unknown")
          REASON=$(jq -r '.reason // "-"' response_body.txt 2>/dev/null || echo "-")
          echo "summary      : status=${STATUS} created=${CREATED} duplicate=${DUPLICATE} skipped=${SKIPPED} errors=${ERRORS} reason=${REASON}"

          if [ "${ERRORS}" = "parse_error" ]; then
            echo "::error::レスポンスJSONを解析できません"
            exit 1
          fi
          if [ "${ERRORS}" -gt 0 ]; then
            echo "::error::daily-zukan-thread が errors=${ERRORS} を返しました"
            exit 1
          fi

      # 8a6309d で安定稼働した既存方式を維持する。
      # 当日分をCron内で新規投稿せず、未来7日分を画像付きでTypefullyへ事前予約する。
      # scheduled_date / typefully_id のガードにより、救済実行が重なっても二重予約しない。
      - name: Refill image-backed Typefully reservations
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail

          START_DATE=$(TZ=Asia/Tokyo date -d 'tomorrow' '+%Y-%m-%d')
          URL="https://www.duema-bbs.com/api/internal/daily-zukan-typefully-reservations?days=7&start_date=${START_DATE}"

          set +e
          HTTP_CODE=$(curl -sS \
            --retry 2 --retry-delay 10 --max-time 180 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -o reservation_response.json -w '%{http_code}' \
            "${URL}")
          CURL_EXIT=$?
          set -e

          echo "HTTP status  : ${HTTP_CODE}"
          echo "----- 予約処理レスポンス -----"
          cat reservation_response.json 2>/dev/null || echo "(本文なし)"
          echo
          echo "------------------------------"

          if [ "${CURL_EXIT}" -ne 0 ]; then
            echo "::error::Typefully予約補充のcurlが失敗しました (exit=${CURL_EXIT})"
            exit "${CURL_EXIT}"
          fi
          case "${HTTP_CODE}" in
            2*) ;;
            *) echo "::error::Typefully予約補充がHTTP ${HTTP_CODE}を返しました"; exit 1 ;;
          esac

          OK=$(jq -r '.ok // false' reservation_response.json 2>/dev/null || echo "parse_error")
          ERRORS=$(jq -r '.summary.errors // 0' reservation_response.json 2>/dev/null || echo "parse_error")
          SCHEDULED=$(jq -r '.summary.scheduled // 0' reservation_response.json 2>/dev/null || echo "0")
          SKIPPED=$(jq -r '.summary.skipped // 0' reservation_response.json 2>/dev/null || echo "0")
          echo "reservation  : ok=${OK} scheduled=${SCHEDULED} skipped=${SKIPPED} errors=${ERRORS}"

          if [ "${OK}" != "true" ] || [ "${ERRORS}" = "parse_error" ] || [ "${ERRORS}" -gt 0 ]; then
            echo "::error::本文＋画像付きTypefully予約を完了できませんでした"
            exit 1
          fi

