name: Sync Typefully

# Typefully 予約投稿 → 掲示板スレ化の自動同期。
# Vercel Hobby/Free の Cron 制約を避けるため、Vercel Cron ではなく
# GitHub Actions から /api/internal/sync-typefully を叩く。
#
# 方針:
#   - JST 7時台の最初の実行で Typefully から「今日分の予約投稿」を取得して x_posts に保存/更新する。
#   - それ以外の定期実行では Typefully API を叩かず、x_posts の scheduled_at 到来分だけをスレ化する。
#   - thread_id がある x_posts は本文を上書きしない。
#   - sync-typefully 側は source_id / source_text_hash / thread_id で重複排除するため冪等。
#
# 実行時刻（JST → UTC 変換）:
#   毎時20分: JST 07:20〜23:20 = UTC 22,23,0-14時
#   救済50分: JST 07:50 / 12:50 / 19:50 / 22:50 = UTC 22:50 / 03:50 / 10:50 / 13:50
on:
  schedule:
    - cron: "20 22,23,0-14 * * *"
    - cron: "50 22,3,10,13 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "ドライラン（true=本番スレ作成なしの確認実行）。安全のため初期値 true"
        type: boolean
        default: true
      mode:
        description: "fetch_and_sync=今日分取得+期限到来スレ化 / fetch_today=取得のみ / sync_due=期限到来スレ化のみ"
        type: choice
        options:
          - fetch_and_sync
          - fetch_today
          - sync_due
        default: fetch_and_sync
      max_new:
        description: "1回の実行で新規作成する最大スレッド数"
        type: string
        default: "5"
      base_url:
        description: "手動検証用の呼び出し先ベースURL。通常は本番URLのまま"
        type: string
        default: "https://www.duema-bbs.com"

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Call sync-typefully API
        env:
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
          # schedule 実行では inputs が空 → 本番同期(dry_run=false)・max_new=5。
          # workflow_dispatch では入力値を使用（初期値は dry_run=true の安全側）。
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
          INPUT_MODE: ${{ github.event.inputs.mode || '' }}
          MAX_NEW: ${{ github.event.inputs.max_new || '5' }}
          BASE_URL: ${{ github.event.inputs.base_url || 'https://www.duema-bbs.com' }}
          EVENT_NAME: ${{ github.event_name }}
        run: |
          set -uo pipefail

          BASE="${BASE_URL%/}/api/internal/sync-typefully"
          JST_HOUR="$(TZ=Asia/Tokyo date '+%H')"
          if [ -n "${INPUT_MODE}" ]; then
            MODE="${INPUT_MODE}"
          elif [ "${JST_HOUR}" = "07" ]; then
            MODE="fetch_and_sync"
          else
            MODE="sync_due"
          fi

          if [ "${DRY_RUN}" = "true" ]; then
            URL="${BASE}?mode=${MODE}&max_new=${MAX_NEW}&dry_run=1"
            MODE_LABEL="DRY RUN（本番スレ作成なし）"
          else
            URL="${BASE}?mode=${MODE}&max_new=${MAX_NEW}"
            MODE_LABEL="LIVE（本番同期）"
          fi
          LOG_URL="${BASE}?mode=${MODE}&max_new=${MAX_NEW}"
          if [ "${DRY_RUN}" = "true" ]; then
            LOG_URL="${LOG_URL}&dry_run=1"
          fi

          echo "==== sync-typefully 実行 ===="
          echo "実行時刻 UTC : $(date -u '+%Y-%m-%d %H:%M:%S')"
          echo "実行時刻 JST : $(TZ=Asia/Tokyo date '+%Y-%m-%d %H:%M:%S')"
          echo "トリガー     : ${EVENT_NAME}"
          echo "モード       : ${MODE_LABEL:-${MODE}}"
          echo "sync mode    : ${MODE}"
          echo "max_new      : ${MAX_NEW}"
          echo "base_url     : ${BASE_URL}"
          echo "URL          : ${LOG_URL}"
          echo "============================"

          # -f は HTTP エラー時に本文を隠すため使わない。本文と HTTP status を取得し、
          # 最後に自前で 2xx 以外を失敗扱いにする（-f 相当の失敗挙動は担保）。
          # secret は Authorization ヘッダで渡し、ログには一切出さない。
          set +e
          HTTP_CODE=$(curl -sS \
            -L \
            --retry 2 --retry-delay 10 --max-time 60 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            -o response_body.txt -w '%{http_code}' \
            "${URL}")
          CURL_EXIT=$?
          set -e

          echo "HTTP status  : ${HTTP_CODE}"
          echo "----- レスポンス本文 -----"
          cat response_body.txt 2>/dev/null || echo "(本文なし)"
          echo
          echo "--------------------------"

          if [ "${CURL_EXIT}" -ne 0 ]; then
            echo "::error::curl 失敗 (exit=${CURL_EXIT})"
            exit "${CURL_EXIT}"
          fi
          case "${HTTP_CODE}" in
            2*) echo "OK (HTTP ${HTTP_CODE})" ;;
            *) echo "::error::HTTP ${HTTP_CODE} はエラー扱い"; exit 1 ;;
          esac

          ERRORS=$(jq -r '(.errors // 0) + (.saveErrors // 0)' response_body.txt 2>/dev/null || echo "parse_error")
          CREATED=$(jq -r '.created // 0' response_body.txt 2>/dev/null || echo "0")
          DUPLICATE=$(jq -r '.duplicate // 0' response_body.txt 2>/dev/null || echo "0")
          SKIPPED=$(jq -r '.skipped // 0' response_body.txt 2>/dev/null || echo "0")
          DUE_POSTS=$(jq -r '.duePosts // 0' response_body.txt 2>/dev/null || echo "0")
          FETCHED=$(jq -r '.fetchedTodayTypefullyPosts // 0' response_body.txt 2>/dev/null || echo "0")
          NORMALIZED=$(jq -r '.normalizedTodayTypefullyPosts // 0' response_body.txt 2>/dev/null || echo "0")
          SAVED=$(jq -r '.savedTodayTypefullyPosts // 0' response_body.txt 2>/dev/null || echo "0")
          UPDATED=$(jq -r '.updatedTodayTypefullyPosts // 0' response_body.txt 2>/dev/null || echo "0")
          LOCKED=$(jq -r '.lockedThreadedPosts // 0' response_body.txt 2>/dev/null || echo "0")
          echo "summary      : fetchedToday=${FETCHED} normalizedToday=${NORMALIZED} saved=${SAVED} updated=${UPDATED} lockedThreaded=${LOCKED} created=${CREATED} duplicate=${DUPLICATE} skipped=${SKIPPED} errors=${ERRORS} duePosts=${DUE_POSTS}"

          if [ "${ERRORS}" = "parse_error" ]; then
            echo "::error::レスポンスJSONを解析できません"
            exit 1
          fi
          if [ "${ERRORS}" -gt 0 ]; then
            echo "::error::sync-typefully が errors/saveErrors=${ERRORS} を返しました"
            exit 1
          fi
