name: Apply deck printing replacement

on:
  push:
    branches:
      - fix/deck-replace-printing-after-add

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/deck-replace-printing-after-add
          fetch-depth: 0
      - name: Apply focused change
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('src/app/makers/deck-maker/DeckMaker.tsx')
          text = path.read_text()

          marker = """  function remove(card: DeckCard) {
    const key = zonedPrintingKey(card, cardZone(card, activeZone))
    setEntries((list) => list.flatMap((entry) => zonedPrintingKey(entry, entryZone(entry)) !== key ? [entry] : entry.count > 1 ? [{ ...entry, count: entry.count - 1 }] : []))
  }

"""
          replacement = marker + """  function replaceSelectedPrinting(nextCard: DeckCard) {
    if (!selected || printingKey(nextCard) === printingKey(selected)) {
      selectPrinting(nextCard)
      return
    }

    const zone = selectedZone
    const currentKey = zonedPrintingKey(selected, zone)
    const nextKey = zonedPrintingKey(nextCard, zone)

    setEntries((list) => {
      const currentIndex = list.findIndex((entry) => zonedPrintingKey(entry, entryZone(entry)) === currentKey)
      if (currentIndex < 0) return list

      const currentEntry = list[currentIndex]
      const targetIndex = list.findIndex((entry) => zonedPrintingKey(entry, entryZone(entry)) === nextKey)
      if (targetIndex >= 0 && targetIndex !== currentIndex) {
        return list.flatMap((entry, index) => {
          if (index === currentIndex) return []
          if (index === targetIndex) return [{ ...entry, count: entry.count + currentEntry.count }]
          return [entry]
        })
      }

      return list.map((entry, index) => index === currentIndex
        ? { ...nextCard, count: currentEntry.count, zone }
        : entry)
    })
    selectPrinting(nextCard)
    setNotice('カードのバージョンを変更しました')
  }

"""
          if marker not in text:
              raise SystemExit('remove function marker not found')
          text = text.replace(marker, replacement, 1)

          old = '        onSelectVersion={selectPrinting}\n'
          new = '        onSelectVersion={replaceSelectedPrinting}\n'
          if old not in text:
              raise SystemExit('modal prop marker not found')
          text = text.replace(old, new, 1)

          path.write_text(text)
          PY
          git rm .github/workflows/apply-deck-printing-replace.yml
      - name: Commit change
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/makers/deck-maker/DeckMaker.tsx
          git commit -m "デッキ内カードの収録版を変更可能にする"
          git push origin HEAD:fix/deck-replace-printing-after-add
