name: Patch deck maker modal duplicate

on:
  push:
    branches:
      - fix/deck-maker-modal-duplicate
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: fix/deck-maker-modal-duplicate
          fetch-depth: 0
      - name: Replace stale selected-card merge
        shell: python
        run: |
          from pathlib import Path

          path = Path('src/app/makers/deck-maker/DeckMaker.tsx')
          text = path.read_text(encoding='utf-8')
          old = """          const unique = new Map<string, DeckCard>()
          for (const printing of cards) unique.set(printingKey(printing), printing)
          if (!unique.has(printingKey(card))) unique.set(printingKey(card), card)
          const options = [...unique.values()]
          printingsCache.current.set(card.id, options)
          prefetchCardImages(options)
          setPrintingOptions(options)
"""
          new = """          const unique = new Map<string, DeckCard>()
          for (const printing of cards) unique.set(printingKey(printing), printing)
          const options = [...unique.values()]
          printingsCache.current.set(card.id, options)
          prefetchCardImages(options)
          setPrintingOptions(options)
          setSelectedCard((current) => {
            if (!current || current.id !== card.id) return current
            return options.find((option) => printingKey(option) === printingKey(current)) ?? options[0] ?? current
          })
"""
          if old not in text:
              raise SystemExit('target snippet not found')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
      - name: Remove temporary workflow
        run: rm .github/workflows/patch-deck-maker-modal-duplicate.yml
      - name: Commit patch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/app/makers/deck-maker/DeckMaker.tsx .github/workflows/patch-deck-maker-modal-duplicate.yml
          git commit -m "カード詳細で選択元を収録版一覧へ重複追加しない"
          git push origin HEAD:fix/deck-maker-modal-duplicate
